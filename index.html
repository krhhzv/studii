<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- 📱 Mobile Native -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- 🎨 Theme -->
    <meta name="theme-color" content="#fdfaf7">

    <!-- 🍎 iOS App Mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="studii.">

    <!-- 🧠 SEO -->
    <title>studii.</title>
    <meta name="description" content="minimal study timer. focus better. stay consistent.">

    <!-- 📲 PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- 🖼️ Icons -->
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- 🔤 Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Patrick+Hand&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

    <!-- 🎨 Styles -->
    <link rel="stylesheet" href="style.css">
</head>



<body>

    <!-- 🧱 ROOT -->
    <div id="root"></div>



    <!-- 🔊 SOUNDS (SUBTLE) -->
    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="doneSound" src="https://assets.mixkit.co/active_storage/sfx/1113/1113-preview.mp3"></audio>



    <!-- ⚙️ APP -->
    <script type="module" src="app.js"></script>



    <!-- 📲 SERVICE WORKER -->
    <script>
        if ("serviceWorker" in navigator && window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1") {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js")
                    .then(() => console.log("SW registered"))
                    .catch(() => console.log("SW failed"));
            });
        }
    </script>



</body>

</html>
